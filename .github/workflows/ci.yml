name: Continuous Integration pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source repository code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python validation dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python code style verification (Black)
      run: black --check src/

    - name: Run Python Syntax Quality Linter (Flake8)
      run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Validate Shell script styling (Shellcheck)
      uses: ludeeut/action-shellcheck@master
      with:
        scandir: 'scripts'

    - name: Run Ansible playbooks syntax check
      run: |
        sudo apt-get update && sudo apt-get install -y ansible
        ansible-playbook --syntax-check ansible/site.yml

    - name: Execute automated unit test suite (Pytest)
      env:
        PYTHONPATH: src
      run: pytest
