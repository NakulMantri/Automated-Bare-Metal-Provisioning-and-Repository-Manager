# Ansible Inventory File for Bare-Metal Servers

[bare_metal_servers]
# Target bare-metal provisioned servers to configure with the OS baseline
server01.infra.local ansible_host=10.0.10.11
server02.infra.local ansible_host=10.0.10.12
server03.infra.local ansible_host=10.0.10.13

[repo_servers]
# Host running the custom RPM repository manager and server
repo01.infra.local ansible_host=10.0.10.50

[all:vars]
# Default connection variables for bare-metal servers post-installation
ansible_user=admin
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=true
ansible_become_method=sudo
